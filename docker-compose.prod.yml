services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gargula-api
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      seaweedfs:
        condition: service_healthy
    environment:
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${DATABASE_NAME}
      S3_ENDPOINT_URL: http://seaweedfs:8333
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_REGION: ${S3_REGION}
      S3_ADDRESSING_STYLE: ${S3_ADDRESSING_STYLE}
      S3_MEDIA_BUCKET: ${S3_MEDIA_BUCKET}
      CORS_ORIGIN: ${CORS_ORIGIN}
      ML_EMBEDDING_MODEL_NAME: ${ML_EMBEDDING_MODEL_NAME}
      ML_STT_MODEL_NAME: ${ML_STT_MODEL_NAME}
    restart: always

  postgres:
    image: pgvector/pgvector:pg17
    container_name: gargula-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER} -d ${DATABASE_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  seaweedfs:
    image: chrislusf/seaweedfs:latest
    container_name: gargula-seaweedfs
    ports:
      - "8333:8333"
      - "8888:8888"
      - "9333:9333"
    environment:
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      AWS_REGION: ${S3_REGION}
    command: server -s3 -dir=/data -s3.port=8333 -ip.bind=0.0.0.0
    volumes:
      - seaweedfs-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:9333/cluster/status || wget -q --spider http://127.0.0.1:9333/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  postgres-data:
  seaweedfs-data:
